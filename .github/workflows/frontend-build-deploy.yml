name: Frontend Build Deploy

on:
  workflow_call:
    inputs:
      version: { type: string, required: true }
      ocptoken: { type: string, required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== FE BUILD ==="
          echo "Version: ${{ inputs.version }}"
          echo "Building frontend..."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== FE DEPLOY ==="
          echo "Token: ${{ inputs.ocptoken }}"
          echo "Deploying frontend..."

  restart:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - run: echo "Restarting FE services..."
